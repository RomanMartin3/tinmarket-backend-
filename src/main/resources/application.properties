spring.application.name=tinmarket-backend

# CONEXIoN A BASE DE DATOS (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/stock_saas_db?useSSL=false&serverTimezone=America/Buenos_Aires&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Si en XAMPP pusiste clave, escribila arriba despues del =

# CONFIGURACION DE HIBERNATE (El traductor Java <-> SQL)

# Usemos 'update' por ahora para desarrollo agil.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# JWT Security - La clave se inyecta exclusivamente desde el entorno
jwt.secret=${JWT_SECRET_KEY}