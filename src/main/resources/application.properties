spring.application.name=tinmarket-backend

# CONEXI”N A BASE DE DATOS (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/stock_saas_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Si en XAMPP pusiste clave, escribila arriba despuÈs del =

# CONFIGURACION DE HIBERNATE (El traductor Java <-> SQL)
# "update": Intenta actualizar la tabla si cambia el Java.
# "validate": Solo revisa que coincidan (M·s seguro si ya corriste el SQL).
# Usemos 'update' por ahora para desarrollo ·gil.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect